name: Autograding

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  autograding:
    name: Autograding
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar GCC
        run: sudo apt-get install -y gcc

      # ── Compilación ────────────────────────────────────────────────────────

      - name: "1. El codigo compila sin errores"
        run: gcc -Wall -Wextra -std=c99 src/programa.c src/carrito.c -o programa_ci

      - name: "2. test_unitarios compila"
        run: gcc -Wall -Wextra -std=c99 tests/test_unitarios.c src/carrito.c -o test_unitarios_ci

      - name: "3. test_integracion compila"
        run: gcc -Wall -Wextra -std=c99 tests/test_integracion.c src/carrito.c -o test_integracion_ci

      # ── Tests ──────────────────────────────────────────────────────────────

      - name: "4. test_unitarios pasa (bugs corregidos)"
        run: |
          gcc -Wall -Wextra -std=c99 tests/test_unitarios.c src/carrito.c -o test_unitarios_ci
          ./test_unitarios_ci

      - name: "5. test_integracion tiene al menos un test y pasa"
        run: |
          gcc -Wall -Wextra -std=c99 tests/test_integracion.c src/carrito.c -o test_integracion_ci
          ./test_integracion_ci | grep -q "\[OK\]"

      # ── Salida funcional ───────────────────────────────────────────────────

      - name: "6. El programa imprime el total correcto (2800)"
        run: |
          gcc -Wall -Wextra -std=c99 src/programa.c src/carrito.c -o programa_ci
          ./programa_ci | grep -q '2800'

      # ── Archivos de salida ─────────────────────────────────────────────────

      - name: "7. salidas/test_unitarios.txt existe"
        run: test -f salidas/test_unitarios.txt

      - name: "8. salidas/test_integracion.txt existe"
        run: test -f salidas/test_integracion.txt

      # ── Respuestas cerradas ────────────────────────────────────────────────

      - name: "R1. Respuesta: TOTAL_PROGRAMA=2050"
        run: grep -qE '^TOTAL_PROGRAMA=2050$' proceso_testing.md

      - name: "R2. Respuesta: TEST_PRECIO_UNITARIO_PASA=SI"
        run: grep -qiE '^TEST_PRECIO_UNITARIO_PASA=SI$' proceso_testing.md

      - name: "R3. Respuesta: TEST_TOTAL_CANTIDAD_PASA=NO"
        run: grep -qiE '^TEST_TOTAL_CANTIDAD_PASA=NO$' proceso_testing.md

      - name: "R4. Respuesta: TESTS_UNITARIOS_PASAN=SI"
        run: grep -qiE '^TESTS_UNITARIOS_PASAN=SI$' proceso_testing.md

      - name: "R5. Respuesta: TEST_INTEGRACION_PASA=SI"
        run: grep -qiE '^TEST_INTEGRACION_PASA=SI$' proceso_testing.md

      - name: "R6. Respuesta: BUG_EN_FUNCION_1=carrito_total"
        run: grep -qiE '^BUG_EN_FUNCION_1=carrito_total$' proceso_testing.md

      - name: "R7. Respuesta: BUG_EN_FUNCION_2=carrito_agregar"
        run: grep -qiE '^BUG_EN_FUNCION_2=carrito_agregar$' proceso_testing.md

      - name: "R8. Respuesta: COBERTURA_COMPLETA tiene valor"
        run: grep -qiE '^COBERTURA_COMPLETA=(SI|NO)$' proceso_testing.md

      # ── Reporte final ──────────────────────────────────────────────────────
      - name: Resultado autograding
        if: always()
        uses: education/autograding@v1
